<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Timetable Generator</title>
    <meta name="description" content="A beautiful and modern timetable generator to customize and export your schedules.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar Controls -->
        <aside class="controls no-print">
            <h2>⚙️ Generator Tools</h2>
            
            <div class="control-group">
                <label>Rows (Time Slots)</label>
                <div class="btn-group">
                    <button id="add-row-btn">+ Add Slot</button>
                    <button id="remove-row-btn">- Remove Slot</button>
                </div>
            </div>
            
            <div class="control-group">
                <label>Columns (Days)</label>
                <div class="btn-group">
                    <button id="add-col-btn">+ Add Day</button>
                    <button id="remove-col-btn">- Remove Day</button>
                </div>
            </div>

            <div class="control-group action-buttons">
                <button id="print-btn" class="primary-btn">Save to PDF / Print</button>
                <button id="clear-btn" class="danger-btn">Clear All Cells</button>
            </div>
            
            <div class="info">
                <p>💡 <b>Pro Tip:</b> Every single cell (including dates, subjects, and the main title) is clickable! Just click and type to customize.</p>
            </div>
        </aside>

        <!-- Preview Area -->
        <main class="preview-area">
            <div class="container printable-area">
                <header>
                    <h1 contenteditable="true" spellcheck="false" title="Click to edit title">My Custom Schedule</h1>
                    <p id="current-time" class="no-print">Loading time...</p>
                </header>

                <div class="timetable-wrapper">
                    <div class="timetable-grid" id="timetable">
                        <!-- Timetable generated by JavaScript -->
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
